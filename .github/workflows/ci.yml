name: CI

on:
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'cli/**'
      - 'components/**'
      - 'types/**'
      - 'templates/**'
      - 'styles/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - 'package.json'
      - 'cli/**'
      - 'components/**'
      - 'types/**'
      - 'templates/**'
      - 'styles/**'
      - '.github/workflows/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Lint
        run: npm run lint --if-present

      - name: Test
        run: npm test --if-present

  validate-templates:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        template: [default, docs, product]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Create temp project
        run: |
          mkdir -p /tmp/test-${{ matrix.template }}
          echo '{"name":"test-${{ matrix.template }}","version":"1.0.0","description":"template validation"}' > /tmp/test-${{ matrix.template }}/package.json

      - name: Scaffold with template
        run: |
          cd /tmp/test-${{ matrix.template }}
          node $GITHUB_WORKSPACE/cli/init.mjs init --template ${{ matrix.template }}

      - name: Pack theme for local install
        run: npm pack --pack-destination /tmp/

      - name: Install site deps
        working-directory: /tmp/test-${{ matrix.template }}/site
        run: npm install /tmp/mcptoolshop-site-theme-*.tgz

      - name: Build site
        working-directory: /tmp/test-${{ matrix.template }}/site
        run: npm run build
